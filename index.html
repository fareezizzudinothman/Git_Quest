<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🚀 Git Quest</h1>

    <div class="xp-box">
        XP: <span id="xp">0</span>
    </div>

    <div class="mission-box">
        <h2>Mission</h2>
        <p id="mission"></p>
    </div>

    <div class="terminal">

        <div id="output"></div>

        <div class="input-line">
            <span>> </span>
            <input
                type="text"
                id="command"
                autocomplete="off"
                autofocus
            >
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
